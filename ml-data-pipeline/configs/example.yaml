name: customer-churn-training
description: Extract, engineer features, validate, and export customer churn data

stages:
  - name: load_customers
    type: csv
    path: data/customers.csv

  - name: engineer_features
    type: transform
    operations:
      - fillna:
          email: "unknown"
          phone: "unknown"
      - dropna:
          columns: ["customer_id"]
      - feature:
          name: has_email
          expr: "email != 'unknown'"
      - filter:
          condition: "age > 0"

  - name: validate_quality
    type: validate
    checks:
      - no_nulls: ["customer_id"]
      - unique: ["customer_id"]
      - range: {"age": [0, 120]}

  - name: export_parquet
    type: parquet
    path: output/training_data_v{version}.parquet
